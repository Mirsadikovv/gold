name: Deploy e-skupka.uz

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - run: |
          docker compose -f eskupka/docker-compose.yml down --remove-orphans || true
          docker compose -f eskupka/docker-compose.yml up --build -d
